<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>体检指引单 - {{ patientInfo.name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", "SimHei", sans-serif; padding: 30px; color: #333; }
    .header { text-align: center; margin-bottom: 25px; border-bottom: 3px solid #1a5f7a; padding-bottom: 15px; }
    .header h1 { color: #1a5f7a; font-size: 24px; margin-bottom: 5px; }
    .header .subtitle { color: #666; font-size: 14px; }
    .patient-info { display: flex; justify-content: space-between; background: #f0f7fa; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    .patient-info .info-item { display: flex; gap: 8px; }
    .patient-info .label { color: #666; }
    .patient-info .value { font-weight: bold; }
    .barcode { text-align: center; margin-bottom: 20px; }
    .barcode .code { font-family: monospace; font-size: 18px; letter-spacing: 3px; background: #f5f5f5; padding: 10px 20px; display: inline-block; border: 1px dashed #ccc; }
    .exam-list { margin-bottom: 25px; }
    .exam-list h2 { color: #1a5f7a; font-size: 16px; margin-bottom: 15px; padding-left: 10px; border-left: 4px solid #1a5f7a; }
    .exam-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .exam-item { display: flex; align-items: center; padding: 12px 15px; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; }
    .exam-item .checkbox { width: 18px; height: 18px; border: 2px solid #1a5f7a; border-radius: 3px; margin-right: 12px; display: flex; align-items: center; justify-content: center; }
    .exam-item.completed .checkbox { background: #1a5f7a; }
    .exam-item.completed .checkbox::after { content: "✓"; color: white; font-size: 12px; }
    .exam-item .name { flex: 1; }
    .exam-item .location { color: #888; font-size: 13px; }
    .notes { background: #fff8e6; border: 1px solid #ffd666; border-radius: 6px; padding: 15px; margin-top: 20px; }
    .notes h3 { color: #d48806; font-size: 14px; margin-bottom: 10px; }
    .notes ul { padding-left: 20px; font-size: 13px; color: #666; }
    .notes li { margin-bottom: 5px; }
    .footer { margin-top: 30px; display: flex; justify-content: space-between; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>体检指引单</h1>
    <p class="subtitle">请按以下项目顺序完成体检</p>
  </div>

  <div class="patient-info">
    <div class="info-item">
      <span class="label">姓名：</span>
      <span class="value">{{ patientInfo.name }}</span>
    </div>
    <div class="info-item">
      <span class="label">性别：</span>
      <span class="value">{{ patientInfo.gender }}</span>
    </div>
    <div class="info-item">
      <span class="label">年龄：</span>
      <span class="value">{{ patientInfo.age }} 岁</span>
    </div>
    <div class="info-item">
      <span class="label">体检日期：</span>
      <span class="value">{{ examDate }}</span>
    </div>
  </div>

  <div class="barcode">
    <div class="code">{{ barcode }}</div>
    <p style="font-size: 12px; color: #999; margin-top: 5px;">体检编号</p>
  </div>

  <div class="exam-list">
    <h2>体检项目</h2>
    <div class="exam-grid">
      {{examItemsHtml}}
    </div>
  </div>

  <div class="notes">
    <h3>温馨提示</h3>
    <ul>
      {{notesHtml}}
    </ul>
  </div>

  <div class="footer">
    <span>打印时间：{{ generatedAt }}</span>
    <span>{{ hospitalName }}</span>
  </div>
</body>
</html>
